<h2>Immobilie verwalten</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Name der Immobilie</mat-label>
    <input matInput [(ngModel)]="name" type="text" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onNoClick()">Abbrechen</button>
  <button matButton (click)="onSaveClick()" cdkFocusInitial>Speichern</button>
</mat-dialog-actions>
