<mat-card>
  <mat-card-content>
    <button mat-button (click)="openDialog()">Immobilie hinzufügen <mat-icon>add</mat-icon></button>
    @if (dataSource().length > 0) {
      <mat-table [dataSource]="dataSource()">
        <ng-container matColumnDef="name">
          <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
          <mat-cell *matCellDef="let element"
            ><a [routerLink]="['/realestate', element.id]">{{ element.name }}</a></mat-cell
          >
        </ng-container>

        <ng-container matColumnDef="edit">
          <mat-header-cell *matHeaderCellDef></mat-header-cell>
          <mat-cell *matCellDef="let element"
            ><button mat-icon-button (click)="updateRealEstate(element)">
              <mat-icon>edit</mat-icon>
            </button></mat-cell
          >
        </ng-container>

        <ng-container matColumnDef="delete">
          <mat-header-cell *matHeaderCellDef></mat-header-cell>
          <mat-cell *matCellDef="let element"
            ><button mat-icon-button (click)="deleteRealEstate(element.id)">
              <mat-icon>delete</mat-icon>
            </button></mat-cell
          >
        </ng-container>

        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
      </mat-table>
    } @else {
      <div class="hint">Keine Immobilien vorhanden</div>
    }
  </mat-card-content>
</mat-card>
